<h1>Link 😀</h1>
<div id="global-wrap">
  <div class="left-area">
    <textarea name="ir1" id="ir1" rows="10" cols="100">
      로렘 입숨(lorem ipsum; 줄여서 립숨, lipsum)은 출판이나 그래픽 디자인 분야에서 폰트, 타이포그래피, 레이아웃 같은 그래픽 요소나 시각적 연출을 보여줄 때 사용하는 표준 채우기 텍스트로, 최종 결과물에 들어가는 실제적인 문장 내용이 채워지기 전에 시각 디자인 프로젝트 모형의 채움 글로도 이용된다. 이런 용도로 사용할 때 로렘 입숨을 그리킹(greeking)이라고도 부르며, 때로 로렘 입숨은 공간만 차지하는 무언가를 지칭하는 용어로도 사용된다.

      로렘 입숨은 전통 라틴어와 닮은 점 때문에 종종 호기심을 유발하기도 하지만 그 이상의 의미를 담지는 않는다. 문서에서 텍스트가 보이면 사람들은 전체적인 프레젠테이션보다는 텍스트에 담긴 뜻에 집중하는 경향이 있어서 출판사들은 서체나 디자인을 보일 때는 프레젠테이션 자체에 초점을 맞추기 위해 로렘 입숨을 사용한다.
      
      로렘 입숨은 영어에서 사용하는 문자들의 전형적인 분포에 근접하다고도 하는데, 이 점 때문에 프레젠테이션으로 초점을 이동하는 데에도 도움을 준다.</textarea
    >
  </div>
  <div class="right-area">
    <div class="right-area-top">
      <p>검색할 단어</p>
      <input type="text" id="searchKeyword" value="로렘" />
    </div>
    <div class="right-area-mid">
      <p>추가할 URL</p>
      <input
        type="text"
        id="addURL"
        value="https://ko.wikipedia.org/wiki/%EB%A1%9C%EB%A0%98_%EC%9E%85%EC%88%A8"
      />
    </div>
    <div class="right-area-bottom">
      <input type="button" onclick="showHTML()" value="변환" />
      <p><strong id="result"></strong></p>
    </div>

    <div class="right-area-bottom">
      <input type="button" onclick="copyHTML()" value="완성" />
    </div>
  </div>
</div>
<div id="footer">
  <p>간단 사용설명서</p>
  <ul>
    <li>편집창에 내용을 자유롭게 입력합니다</li>
    <li>검색할 단어에 링크를 붙일 단어를 입력</li>
    <li>추가할 URL에 URL을 입력하세요</li>
    <li>
      변환을 클릭하면 편집창에 해당텍스트에 링크가 붙은걸 확인할 수 있습니다
    </li>
    <li>추가로 만들 링크가 있다면 위의 작업을 반복</li>
    <li>편집이 완료되었으면 완성버튼을 클릭</li>
    <li>복사가 완료되며 원하는 게시판에 코드를 붙여넣으면 됩니다</li>
  </ul>
</div>

<script type="text/javascript">
  var oEditors = [];
  nhn.husky.EZCreator.createInIFrame({
    oAppRef: oEditors,
    elPlaceHolder: "ir1",
    sSkinURI: "se2/SmartEditor2Skin.html",
    fCreator: "createSEditor2",
  });

  function showHTML() {
    oEditors.getById["ir1"].exec("UPDATE_CONTENTS_FIELD", []);

    const original = document.getElementById("ir1").value;
    const s = document.getElementById("searchKeyword").value;

    const url = document.getElementById("addURL").value;

    const u = "<a href=" + url + ">" + s + "</a>";
    //init
    oEditors.getById["ir1"].exec("SET_IR", [""]);
    //update
    oEditors.getById["ir1"].exec("PASTE_HTML", [original.replaceAll(s, u)]);

    const complete = document.getElementById("result");
    complete.innerHTML = "변환이 완료되었습니다";
  }

  function copyHTML() {
    oEditors.getById["ir1"].exec("UPDATE_CONTENTS_FIELD", []);

    const original = document.getElementById("ir1").value;

    const complete = (original.innerHTML =
      '<div style="display:none;">' + original + "</div>");

    var t = document.createElement("textarea");
    document.body.appendChild(t);
    t.value = complete;
    t.select();
    document.execCommand("copy");
    document.body.removeChild(t);

    alert("코드가 복사되었습니다. 원하는 게시판에 붙여넣으세요");
  }
</script>
